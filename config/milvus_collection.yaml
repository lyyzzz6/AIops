# ============================================================
# Milvus Collection 配置文件
# ============================================================
#
# 用途：定义向量集合的结构和索引配置
#
# 使用方法：
#   1. 修改配置后运行 init_milvus.py
#   2. 或使用 Milvus CLI 导入
#
# 注意事项：
#   - 向量维度创建后不可更改
#   - 修改配置需要重建 Collection
#
# 作者：刘一舟
# 更新时间：2026-04-03
# ============================================================

# ============================================================
# Collection 基础配置
# ============================================================
collection:
  # Collection 名称
  name: ops_knowledge_base

  # 描述
  description: 智能运维知识库向量集合，存储运维文档的向量表示

  # 分片数量（分布式部署时使用，单机模式为 1）
  shard_number: 1

  # 是否启用动态字段
  # 关闭可确保数据结构一致性
  enable_dynamic_field: false

# ============================================================
# 向量配置
# ============================================================
vector:
  # 向量维度
  # BGE-M3 模型固定输出 1024 维向量
  # 创建后不可更改，务必确认！
  dimension: 1024

  # 相似度度量类型
  # COSINE: 余弦相似度，适合文本语义检索（推荐）
  # L2: 欧氏距离，适合图像特征
  # IP: 内积，适合归一化向量
  metric_type: COSINE

# ============================================================
# 索引配置
# ============================================================
# 索引类型选择指南：
#
# 数据量 < 10万：
#   - FLAT: 精确搜索，无精度损失
#
# 数据量 10-100万：
#   - IVF_FLAT: 平衡方案，可调节精度（推荐）
#
# 数据量 100-1000万：
#   - IVF_PQ: 内存优化，有精度损失
#   - HNSW: 高性能，内存占用大
#
# 数据量 > 1000万：
#   - GPU_IVF_FLAT: GPU 加速
#   - HNSW + 分片
# ============================================================
index:
  # 索引类型
  type: IVF_FLAT

  # 索引参数
  params:
    # IVF 聚类中心数量
    # 数据量越大，此值应越大
    # 建议：sqrt(N) 到 N/100 之间
    nlist: 128

# ============================================================
# 搜索配置
# ============================================================
search:
  # 搜索参数
  params:
    # 搜索的聚类数量
    # 越大越准确但越慢
    # 建议：nlist 的 10%-20%
    nprobe: 16

  # 返回结果数量
  top_k: 5

  # 输出字段（搜索结果中返回的字段）
  output_fields:
    - content
    - source
    - title
    - chunk_index

# ============================================================
# 字段定义
# ============================================================
fields:
  - name: id
    dtype: INT64
    is_primary: true
    auto_id: true
    description: 主键 ID，自动生成

  - name: content
    dtype: VARCHAR
    max_length: 8000
    description: 文档内容片段

  - name: embedding
    dtype: FLOAT_VECTOR
    dim: 1024
    description: 文档向量（BGE-M3 1024 维）

  - name: source
    dtype: VARCHAR
    max_length: 512
    description: 文档来源（URL 或文件名）

  - name: title
    dtype: VARCHAR
    max_length: 256
    description: 文档标题

  - name: chunk_index
    dtype: INT64
    description: 片段索引（同一文档的第几段）

  - name: created_at
    dtype: INT64
    description: 创建时间戳

# ============================================================
# 分区配置（可选）
# ============================================================
# 分区用于数据隔离和查询优化
# 例如：按时间分区、按来源分区
# ============================================================
partitions:
  enabled: false
  # partitions:
  #   - name: "docs_netdata"
  #     description: "NetData 官方文档"
  #   - name: "docs_prometheus"
  #     description: "Prometheus 相关文档"

# ============================================================
# 数据保留策略（可选）
# ============================================================
retention:
  # 是否启用 TTL（生存时间）
  enabled: false
  # TTL 天数
  days: 365

# ============================================================
# 性能调优建议
# ============================================================
#
# 内存估算：
#   每条记录 ≈ 1024 * 4 bytes (向量) + 500 bytes (元数据) ≈ 4.5 KB
#   10万条记录 ≈ 450 MB
#   100万条记录 ≈ 4.5 GB
#
# 索引大小估算（IVF_FLAT）：
#   约为原始数据大小的 10%-20%
#
# nlist 选择建议：
#   - 10万数据：nlist = 32-64
#   - 50万数据：nlist = 64-128
#   - 100万数据：nlist = 128-256
#   - 500万数据：nlist = 256-512
#
# nprobe 选择建议：
#   - 高精度：nprobe = nlist / 2
#   - 平衡：nprobe = nlist / 8
#   - 高速：nprobe = nlist / 16
# ============================================================
