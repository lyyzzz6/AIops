# ============================================================
# 智能运维问答与执行系统 - 应用配置
# ============================================================
#
# 配置说明：
# - 使用 Profile 区分开发环境和生产环境
# - LLM 配置两套：DeepSeek API + Ollama 本地
# - 敏感信息从环境变量读取
#
# 作者：刘一舟
# 更新时间：2026-04-30
# ============================================================

server:
  port: 8080

spring:
  application:
    name: netdata-ai-backend
  
  # ============================================================
  # Profile 配置
  # 开发环境使用 ollama，生产环境使用 deepseek
  # ============================================================
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:prod}
  
  # ============================================================
  # 数据源配置
  # ============================================================
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3307}/${MYSQL_DATABASE:netdata_ops}?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:ops_user}
    password: ${MYSQL_PASSWORD:ops123456}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      pool-name: NetDataOpsPool
      max-lifetime: 1800000
      connection-timeout: 30000
  
  # ============================================================
  # Redis 配置
  # ============================================================
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis123456}
      database: ${REDIS_DB:0}
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 3000ms
  
  # ============================================================
  # Jackson JSON 配置
  # ============================================================
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

  # ============================================================
  # Spring AI 配置
  # 注意：使用 ChatClient，AiClient 已废弃
  # ============================================================
  ai:
    openai:
      api-key: ${DEEPSEEK_API_KEY:sk-f37bb4263ac1451995941de334cec349}
      base-url: ${DEEPSEEK_API_URL:https://api.deepseek.com/v1}
      chat:
        options:
          model: deepseek-chat
          temperature: 0.7
          max-tokens: 4096

# ============================================================
# MyBatis-Plus 配置
# ============================================================
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.netdata.ops.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# ============================================================
# Milvus 向量数据库配置
# ============================================================
milvus:
  host: ${MILVUS_HOST:localhost}
  port: ${MILVUS_GRPC_PORT:19532}
  database: default
  collection-name: ops_knowledge_base
  # 向量维度：BGE-M3 固定 1024 维，创建后不可更改！
  vector-dimension: 1024
  
# ============================================================
# RAG 配置
# ============================================================
rag:
  # 文档切分配置
  chunk:
    # 语义切分：按句子相似度切分
    semantic-chunking: true
    # 固定长度切分（语义切分不可用时回退）
    chunk-size: 500
    chunk-overlap: 50
    # 最小切片长度
    min-chunk-size: 100
  
  # 检索配置
  retrieval:
    # 向量检索 Top-K
    vector-top-k: 20
    # BM25 检索 Top-K  
    bm25-top-k: 20
    # 最终返回数量
    final-top-k: 5
    # RRF 融合参数
    rrf-k: 60
    # 相似度阈值
    similarity-threshold: 0.7

# ============================================================
# LLM 降级配置（Ollama 本地模型作为 DeepSeek 备用）
# ============================================================
llm:
  fallback:
    base-url: ${OLLAMA_BASE_URL:http://localhost:11435}
    model: ${OLLAMA_MODEL:qwen2.5:7b}

# ============================================================
# Python 异常检测服务配置
# ============================================================
anomaly-detection:
  url: ${ANOMALY_SERVICE_URL:http://localhost:8001}
  timeout: 30s
  retry:
    max-attempts: 3
    backoff: 1s

# ============================================================
# 命令执行安全配置
# ============================================================
execution:
  # 黑名单命令（禁止执行）
  blacklist:
    - "rm -rf /*"
    - "rm -rf /"
    - "mkfs"
    - "dd if="
    - "> /dev/sd"
    - ":(){ :|:& };:"
  
  # 白名单命令（自动执行）
  whitelist:
    - "systemctl status"
    - "systemctl list-"
    - "journalctl"
    - "cat /var/log"
    - "ls"
    - "ps aux"
    - "netstat"
    - "df -h"
    - "free -h"
    - "top -n 1"
    - "curl"
    - "ping -c"
  
  # 风险评估阈值
  risk-thresholds:
    low: 30
    medium: 60
    high: 80

# ============================================================
# Security - JWT 认证配置
# ============================================================
security:
  jwt:
    secret: ${JWT_SECRET:netdata-ops-default-jwt-secret-key-2026-must-be-256-bits}
    access-token-expiration: 7200000   # 2小时
    refresh-token-expiration: 604800000  # 7天
  rate-limit:
    default-limit: 60   # 默认每分钟60次
    chat-limit: 10      # AI问答每分钟10次
    login-limit: 10     # 登录每分钟10次

# ============================================================
# Actuator - 健康检查与监控指标
# ============================================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,agents,circuitbreakers,retries
  endpoint:
    health:
      show-details: when-authorized
  health:
    circuitbreakers:
      enabled: true
    ratelimiters:
      enabled: true

# ============================================================
# Resilience4j 监控与 Actuator 集成
# 编程式配置见 ResilienceConfig.java，此处仅配置指标暴露
# ============================================================
resilience4j:
  circuitbreaker:
    metrics:
      enabled: true
  retry:
    metrics:
      enabled: true
  bulkhead:
    metrics:
      enabled: true
  timelimiter:
    metrics:
      enabled: true

# ============================================================
# OpenAPI/Swagger 文档配置
# ============================================================
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method

# ============================================================
# WebSocket 配置（实时告警、审批通知）
# ============================================================
websocket:
  path: /ws
  allowed-origins: "*"

# ============================================================
# 日志配置
# ============================================================
logging:
  level:
    root: INFO
    com.netdata.ops: DEBUG
    org.springframework.ai: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{traceId}] %-5level %logger{36} - %msg%n"
  file:
    name: logs/netdata-ops.log
    max-size: 10MB
    max-history: 30

# ============================================================
# 开发环境特定配置
# ============================================================
---
spring:
  config:
    activate:
      on-profile: dev
  
  ai:
    openai:
      # 开发环境使用 Ollama 本地
      base-url: http://localhost:11435/v1
      api-key: ollama
      chat:
        options:
          model: qwen2.5:7b

logging:
  level:
    com.netdata.ops: DEBUG

# ============================================================
# 生产环境特定配置
# ============================================================
---
spring:
  config:
    activate:
      on-profile: prod
  
  ai:
    openai:
      base-url: ${DEEPSEEK_API_URL:https://api.deepseek.com/v1}
      api-key: ${DEEPSEEK_API_KEY:sk-f37bb4263ac1451995941de334cec349}
      chat:
        options:
          model: deepseek-chat

logging:
  level:
    root: WARN
    com.netdata.ops: INFO
